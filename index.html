  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f4f2f0;
      --panel:  #f7f5f3;
      --ink:    #20201f;
      --muted:  #918b84;
      --line:   #ded6cf;
      --accent: #b85c38;
      --max:    940px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Jost", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    a { color: inherit; text-decoration: none; }
    h1, h2, h3 { font-weight: normal; letter-spacing: 0.04em; }
    h1 { line-height: 1.2; }

    .page { min-height: 100vh; display: flex; flex-direction: column; }
    .shell { max-width: var(--max); margin: 0 auto; padding: 0 28px; }

    /* ── header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(244, 242, 240, 0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(222, 214, 207, 0.6);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .brand { display: flex; flex-direction: column; gap: 2px; }
    .brand-name    { font-size: 14px; letter-spacing: 0.12em; text-transform: lowercase; }
    .brand-tagline { font-size: 10px; letter-spacing: 0.14em; text-transform: lowercase; color: var(--muted); }

    /* desktop nav */
    .nav-desktop {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 13px;
    }

    .nav-desktop a {
      text-transform: lowercase;
      color: var(--muted);
      transition: color 0.18s;
      padding: 2px 0;
    }
    .nav-desktop a:hover { color: var(--accent); }

    /* CTA pill */
    .cta-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      color: var(--accent) !important;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: lowercase;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
    }
    .cta-pill:hover { background: var(--accent); color: var(--bg) !important; }

    /* lang toggle */
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 1px;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--line);
    }
    .lang-button {
      border: none;
      background: transparent;
      padding: 3px 8px;
      border-radius: 999px;
      cursor: pointer;
      text-transform: lowercase;
      color: var(--muted);
      font: inherit;
      font-size: 11px;
      transition: background 0.18s, color 0.18s;
    }
    .lang-button.active { background: var(--accent); color: var(--bg); }

    /* hamburger — mobile only */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 110;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--ink);
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* mobile nav overlay */
    .nav-mobile {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 90;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .nav-mobile.open { opacity: 1; pointer-events: all; }

    .nav-mobile a {
      font-size: 24px;
      text-transform: lowercase;
      letter-spacing: 0.06em;
      color: var(--ink);
    }

    .nav-mobile .cta-pill { font-size: 15px; padding: 8px 22px; }

    .nav-mobile-lang {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    .nav-mobile-lang button {
      border: none;
      background: none;
      font: inherit;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: var(--muted);
      cursor: pointer;
      text-transform: lowercase;
    }
    .nav-mobile-lang button.active { color: var(--accent); }

    @media (max-width: 680px) {
      .nav-desktop { display: none; }
      .hamburger   { display: flex; }
      .nav-mobile  { display: flex; }
    }

    /* ── sections ── */
    main { flex: 1; }
    section { padding: 88px 28px 72px; }
    section:nth-child(even) { background: var(--panel); }
    .section-inner { max-width: var(--max); margin: 0 auto; }

    .section-eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .section-title { font-size: 20px; text-transform: lowercase; margin-bottom: 18px; }
    .section-lead  { font-size: 14px; color: var(--muted); max-width: 500px; margin-bottom: 28px; line-height: 1.8; }

    /* ── hero ── */
    .hero { padding-top: 110px; padding-bottom: 90px; }
    .hero-inner { max-width: var(--max); margin: 0 auto; }
    .hero-main  { max-width: 540px; }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .hero-headline {
      font-size: clamp(26px, 3.8vw, 36px);
      line-height: 1.3;
      text-transform: lowercase;
      margin-bottom: 20px;
    }

    .hero-sub {
      font-size: 14px;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    /* ── services ── */
    .services-list { list-style: none; }

    .service-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: baseline;
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }
    .service-item:first-child { border-top: 1px solid var(--line); }

    .service-name {
      font-size: 15px;
      text-transform: lowercase;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
    }

    .service-desc {
      font-size: 12px;
      color: var(--muted);
      max-width: 500px;
      line-height: 1.7;
    }

    .service-price {
      font-size: 14px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      text-align: right;
      color: var(--accent);
    }
    .service-price small {
      display: block;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: lowercase;
      margin-top: 2px;
    }

    @media (max-width: 580px) {
      .service-item  { grid-template-columns: 1fr; gap: 8px; }
      .service-price { text-align: left; }
    }

    .services-footnote {
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── about ── */
    .about-body { max-width: 560px; }
    .about-body p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 18px;
    }
    .about-body p:last-child { margin-bottom: 0; }

    /* ── contact ── */
    .contact-simple {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: var(--bg);
      padding: 11px 24px;
      font: inherit;
      font-size: 13px;
      text-transform: lowercase;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.18s;
    }
    .wa-btn:hover { opacity: 0.85; }
    .wa-btn svg   { width: 15px; height: 15px; flex-shrink: 0; }

    .contact-links { display: flex; flex-direction: column; }

    .contact-link {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      transition: color 0.18s;
    }
    .contact-link:first-child { border-top: 1px solid var(--line); }
    .contact-link:hover .contact-link-val { color: var(--accent); }

    .contact-link-label { font-size: 11px; letter-spacing: 0.12em; text-transform: lowercase; color: var(--muted); width: 80px; flex-shrink: 0; }
    .contact-link-val   { font-size: 12px; color: var(--ink); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

    /* ── footer ── */
    footer { border-top: 1px solid rgba(222, 214, 207, 0.6); font-size: 11px; color: var(--muted); padding: 24px 0; }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 560px) {
      section { padding: 72px 20px 56px; }
      .shell  { padding: 0 20px; }
      .hero   { padding: 80px 20px 64px; }
      .wa-float { bottom: 20px; right: 20px; }
    }

    /* ── reveals ── */
    .js-ready .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .js-ready .reveal.visible { opacity: 1; transform: none; }
    .js-ready .reveal-d1 { transition-delay: 0.12s; }
    .js-ready .reveal-d2 { transition-delay: 0.24s; }
  </style>
</head>

<script>
  // year
  document.getElementById("year").textContent = new Date().getFullYear();

  // CTA pill — WhatsApp on mobile, scroll on desktop
  (function () {
    var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
    var wa = "https://wa.me/31616120895?text=Hi%2C%20I%27d%20like%20to%20book%20a%20repair.%20I%27ll%20send%20some%20photos.";
    ["cta-pill", "cta-pill-mobile"].forEach(function (id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (isMobile) { el.href = wa; el.target = "_blank"; el.rel = "noreferrer"; }
    });
  })();

  // language toggle
  (function () {
    var buttons = document.querySelectorAll(".lang-button");
    var els     = document.querySelectorAll(".t");

    function setLang(lang) {
      document.documentElement.lang = lang;
      buttons.forEach(function (btn) {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
      els.forEach(function (el) {
        var val = el.dataset[lang === "nl" ? "nl" : "en"];
        if (val !== undefined) el.textContent = val;
      });
      try { localStorage.setItem("knitfix-lang", lang); } catch (e) {}
    }

    buttons.forEach(function (btn) {
      btn.addEventListener("click", function () { setLang(btn.dataset.lang); });
    });

    var init = "nl";
    try { var s = localStorage.getItem("knitfix-lang"); if (s === "nl" || s === "en") init = s; } catch (e) {}
    setLang(init);
  })();

  // hamburger
  (function () {
    var btn   = document.getElementById("hamburger");
    var nav   = document.getElementById("nav-mobile");
    var links = nav.querySelectorAll("a");

    function close() {
      btn.classList.remove("open");
      nav.classList.remove("open");
      nav.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    btn.addEventListener("click", function () {
      var opening = !btn.classList.contains("open");
      btn.classList.toggle("open");
      nav.classList.toggle("open");
      nav.setAttribute("aria-hidden", String(!opening));
      document.body.style.overflow = opening ? "hidden" : "";
    });

    links.forEach(function (l) { l.addEventListener("click", close); });
  })();

  // scroll reveals
  (function () {
    document.body.classList.add("js-ready");
    if (!window.IntersectionObserver) {
      document.querySelectorAll(".reveal").forEach(function (el) { el.classList.add("visible"); });
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add("visible"); io.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll(".reveal").forEach(function (el) { io.observe(el); });
  })();
</script>
